# Build and publish the interactive demo image to GHCR.
#
# This is the image behind `docker run -it ghcr.io/mrg77/opsforge-demo` and the
# Codespaces / dev-container experience. It is NOT the production image
# (that one is distroless, built from ./Dockerfile) — this one ships zsh, the
# forged shell layer, a fake prod context and no-op tool stubs so anyone can
# try opsforge safely.
name: demo-image

on:
  push:
    branches: [main]
    paths: # only rebuild when the demo (or the binary's sources) change
      - "demo/**"
      - ".github/workflows/demo-image.yml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  release:
    types: [published] # also tag the demo image on every release
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/opsforge-demo

permissions:
  contents: read
  packages: write # push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` on main; the version tag on a release.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: demo/Dockerfile.demo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # The brew-formula validation test is exercised by the dedicated
      # catalog-validation job; skip it here to keep unit tests offline.
      OPSFORGE_SKIP_BREW_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: go test
        run: go test -race ./...

  # Validates that every brew reference in the catalog resolves to a real
  # formula/cask of the declared kind, via the public Homebrew API — so a
  # renamed/removed formula is caught before a user hits it mid-install.
  catalog-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Validate catalog formulas against the Homebrew API
        run: go test ./internal/catalog/ -run TestCatalogBrewFormulasExist -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Cross-compile all release targets
        run: |
          for os in darwin linux; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -o /dev/null .
            done
          done

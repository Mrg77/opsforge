profiles:
  - name: core
    description: Daily-driver basics for any ops work
    tools: [jq, yq, fzf, direnv, gh, ripgrep, bat]
  - name: k8s
    description: Kubernetes workstation
    tools: [kubectl, helm, k9s, kubectx, stern, kustomize]
  - name: aws-k8s
    description: AWS + Kubernetes stack
    tools: [aws, eksctl, kubectl, helm, k9s, terraform, docker, colima]
  - name: gcp-k8s
    description: Google Cloud + Kubernetes stack
    tools: [gcloud, kubectl, helm, k9s, terraform, docker, colima]
  - name: iac
    description: Infrastructure as Code toolbox
    tools: [terraform, opentofu, terragrunt, tflint, terraform-docs, ansible, packer]
  - name: observability
    description: Monitoring, load testing and log digging
    tools: [k6, vegeta, btop, ctop, stern, lnav, prometheus, node_exporter, grafana, otel-cli]
  - name: security
    description: DevSecOps essentials
    tools: [trivy, grype, syft, gitleaks, sops, age, cosign, hadolint]
  - name: secrets
    description: Secrets and identity management
    tools: [sops, age, vault, step, mkcert, gitleaks]
  - name: sysadmin
    description: System administration and troubleshooting essentials
    tools: [htop, glances, dust, duf, ncdu, procs, tmux, rsync, rclone, tcpdump, mtr]
  - name: netsec
    description: Network reconnaissance and security testing
    tools: [nmap, masscan, nuclei, ffuf, gobuster, subfinder, httpx, dnsx, sslscan, semgrep]
  - name: ai
    description: Local and cloud LLM tooling for the terminal
    tools: [ollama, llm, aichat, mods, aider]

categories:
  - name: Kubernetes
    tools:
      - name: kubectl
        bin: kubectl
        brew: kubernetes-cli
        description: Kubernetes command-line tool
        version_args: ["version", "--client"]
        completion_zsh: ["kubectl", "completion", "zsh"]
      - name: helm
        bin: helm
        brew: helm
        description: Kubernetes package manager
        version_args: ["version", "--short"]
        completion_zsh: ["helm", "completion", "zsh"]
        osv: {ecosystem: Go, name: helm.sh/helm/v3}
      - name: k9s
        bin: k9s
        brew: k9s
        description: Terminal UI to manage Kubernetes clusters
        version_args: ["version", "--short"]
        completion_zsh: ["k9s", "completion", "zsh"]
        github:
          repo: derailed/k9s
          asset: "k9s_{os}_{arch}.tar.gz"
          os_map: {darwin: Darwin, linux: Linux}
          arch_map: {amd64: amd64, arm64: arm64}
      - name: kubectx
        bin: kubectx
        brew: kubectx
        description: Fast context and namespace switching (kubectx + kubens)
        github:
          repo: ahmetb/kubectx
          asset: "kubectx_{tag}_{os}_{arch}.tar.gz"
          os_map: {darwin: darwin, linux: linux}
          arch_map: {amd64: x86_64, arm64: arm64}
      - name: kind
        bin: kind
        brew: kind
        description: Run local Kubernetes clusters in Docker
        completion_zsh: ["kind", "completion", "zsh"]
        github:
          repo: kubernetes-sigs/kind
          asset: "kind-{os}-{arch}"
      - name: minikube
        bin: minikube
        brew: minikube
        description: Local single-node Kubernetes cluster
        completion_zsh: ["minikube", "completion", "zsh"]
      - name: stern
        bin: stern
        brew: stern
        description: Multi-pod log tailing for Kubernetes
        completion_zsh: ["stern", "--completion", "zsh"]
        github:
          repo: stern/stern
          asset: "stern_{version}_{os}_{arch}.tar.gz"
      - name: kustomize
        bin: kustomize
        brew: kustomize
        description: Template-free Kubernetes manifest customization
        version_args: ["version"]
        completion_zsh: ["kustomize", "completion", "zsh"]
      - name: argocd
        bin: argocd
        brew: argocd
        description: GitOps continuous delivery CLI for Kubernetes
        version_args: ["version", "--client", "--short"]
        completion_zsh: ["argocd", "completion", "zsh"]
        osv: {ecosystem: Go, name: github.com/argoproj/argo-cd/v2}
        github:
          repo: argoproj/argo-cd
          asset: "argocd-{os}-{arch}"
      - name: flux
        bin: flux
        brew: fluxcd/tap/flux
        description: GitOps toolkit CLI (Flux CD)
        completion_zsh: ["flux", "completion", "zsh"]
        github:
          repo: fluxcd/flux2
          asset: "flux_{version}_{os}_{arch}.tar.gz"
      - name: velero
        bin: velero
        brew: velero
        description: Kubernetes backup and restore
        version_args: ["version", "--client-only"]
        completion_zsh: ["velero", "completion", "zsh"]
      - name: kubeseal
        bin: kubeseal
        brew: kubeseal
        description: Encrypt secrets for Sealed Secrets controller
      - name: krew
        bin: kubectl-krew
        brew: krew
        description: Plugin manager for kubectl
      - name: helmfile
        bin: helmfile
        brew: helmfile
        description: Declarative spec for deploying Helm charts
        completion_zsh: ["helmfile", "completion", "zsh"]
      - name: kubeconform
        bin: kubeconform
        brew: kubeconform
        description: Fast Kubernetes manifest validation
      - name: popeye
        bin: popeye
        brew: popeye
        description: Kubernetes cluster sanitizer / linter
      - name: skaffold
        bin: skaffold
        brew: skaffold
        description: Continuous development for Kubernetes apps
        completion_zsh: ["skaffold", "completion", "zsh"]
      - name: k3d
        bin: k3d
        brew: k3d
        description: Run k3s (lightweight Kubernetes) in Docker
        completion_zsh: ["k3d", "completion", "zsh"]
      - name: kyverno
        bin: kyverno
        brew: kyverno
        description: Kubernetes policy management CLI
      - name: vcluster
        bin: vcluster
        brew: vcluster
        description: Create virtual Kubernetes clusters
      - name: chart-testing
        bin: ct
        brew: chart-testing
        description: Lint and test Helm charts
      - name: helm-docs
        bin: helm-docs
        brew: helm-docs
        description: Generate documentation for Helm charts
      - name: kubie
        bin: kubie
        brew: kubie
        description: Context and namespace switching with subshells
      - name: kubecolor
        bin: kubecolor
        brew: kubecolor
        description: Colorize kubectl output
      - name: kdash
        bin: kdash
        brew: kdash
        description: Fast terminal dashboard for Kubernetes
      - name: kubetail
        bin: kubetail
        brew: kubetail
        description: Tail logs from multiple pods at once
      - name: kubectl-tree
        bin: kubectl-tree
        brew: kubectl-tree
        description: Show ownership hierarchy of Kubernetes objects
      - name: kor
        bin: kor
        brew: kor
        description: Find unused resources in Kubernetes clusters
      - name: kubeshark
        bin: kubeshark
        brew: kubeshark
        description: API traffic viewer for Kubernetes
      - name: ktop
        bin: ktop
        brew: ktop
        description: top-like tool for Kubernetes clusters
      - name: crossplane
        bin: crossplane
        brew: crossplane
        description: Build control planes without writing code (Crossplane CLI)
      - name: timoni
        bin: timoni
        brew: timoni
        description: Package manager for Kubernetes powered by CUE

  - name: Infrastructure as Code
    tools:
      - name: terraform
        bin: terraform
        brew: hashicorp/tap/terraform
        description: HashiCorp infrastructure as code
        version_args: ["version"]
        osv: {ecosystem: Go, name: github.com/hashicorp/terraform}
      - name: opentofu
        bin: tofu
        brew: opentofu
        description: Open-source Terraform fork (Linux Foundation)
        version_args: ["version"]
      - name: terragrunt
        bin: terragrunt
        brew: terragrunt
        description: Terraform wrapper for DRY multi-env configs
      - name: tflint
        bin: tflint
        brew: terraform-linters/tap/tflint
        cask: true
        description: Terraform linter
      - name: terraform-docs
        bin: terraform-docs
        brew: terraform-docs
        description: Generate docs from Terraform modules
      - name: infracost
        bin: infracost
        brew: infracost
        description: Cloud cost estimates for Terraform
        completion_zsh: ["infracost", "completion", "--shell", "zsh"]
      - name: packer
        bin: packer
        brew: hashicorp/tap/packer
        description: Machine image builder
        version_args: ["version"]
      - name: ansible
        bin: ansible
        brew: ansible
        description: Agentless configuration management
      - name: pulumi
        bin: pulumi
        brew: pulumi
        description: Infrastructure as code in real languages
        completion_zsh: ["pulumi", "gen-completion", "zsh"]


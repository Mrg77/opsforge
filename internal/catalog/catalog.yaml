profiles:
  - name: core
    description: Daily-driver basics for any ops work
    tools: [jq, yq, fzf, direnv, gh, ripgrep, bat]
  - name: k8s
    description: Kubernetes workstation
    tools: [kubectl, helm, k9s, kubectx, stern, kustomize]
  - name: aws-k8s
    description: AWS + Kubernetes stack
    tools: [aws, eksctl, kubectl, helm, k9s, terraform, docker, colima]
  - name: gcp-k8s
    description: Google Cloud + Kubernetes stack
    tools: [gcloud, kubectl, helm, k9s, terraform, docker, colima]
  - name: iac
    description: Infrastructure as Code toolbox
    tools: [terraform, opentofu, terragrunt, tflint, terraform-docs, ansible, packer]
  - name: observability
    description: Monitoring, load testing and log digging
    tools: [k6, vegeta, btop, ctop, stern, lnav]
  - name: security
    description: DevSecOps essentials
    tools: [trivy, grype, syft, gitleaks, sops, age, cosign, hadolint]
  - name: secrets
    description: Secrets and identity management
    tools: [sops, age, vault, step, mkcert, gitleaks]

categories:
  - name: Kubernetes
    tools:
      - name: kubectl
        bin: kubectl
        brew: kubernetes-cli
        description: Kubernetes command-line tool
        version_args: ["version", "--client"]
        completion_zsh: ["kubectl", "completion", "zsh"]
      - name: helm
        bin: helm
        brew: helm
        description: Kubernetes package manager
        version_args: ["version", "--short"]
        completion_zsh: ["helm", "completion", "zsh"]
        osv: {ecosystem: Go, name: helm.sh/helm/v3}
      - name: k9s
        bin: k9s
        brew: k9s
        description: Terminal UI to manage Kubernetes clusters
        version_args: ["version", "--short"]
        completion_zsh: ["k9s", "completion", "zsh"]
        github:
          repo: derailed/k9s
          asset: "k9s_{os}_{arch}.tar.gz"
          os_map: {darwin: Darwin, linux: Linux}
          arch_map: {amd64: amd64, arm64: arm64}
      - name: kubectx
        bin: kubectx
        brew: kubectx
        description: Fast context and namespace switching (kubectx + kubens)
        github:
          repo: ahmetb/kubectx
          asset: "kubectx_{tag}_{os}_{arch}.tar.gz"
          os_map: {darwin: darwin, linux: linux}
          arch_map: {amd64: x86_64, arm64: arm64}
      - name: kind
        bin: kind
        brew: kind
        description: Run local Kubernetes clusters in Docker
        completion_zsh: ["kind", "completion", "zsh"]
        github:
          repo: kubernetes-sigs/kind
          asset: "kind-{os}-{arch}"
      - name: minikube
        bin: minikube
        brew: minikube
        description: Local single-node Kubernetes cluster
        completion_zsh: ["minikube", "completion", "zsh"]
      - name: stern
        bin: stern
        brew: stern
        description: Multi-pod log tailing for Kubernetes
        completion_zsh: ["stern", "--completion", "zsh"]
        github:
          repo: stern/stern
          asset: "stern_{version}_{os}_{arch}.tar.gz"
      - name: kustomize
        bin: kustomize
        brew: kustomize
        description: Template-free Kubernetes manifest customization
        version_args: ["version"]
        completion_zsh: ["kustomize", "completion", "zsh"]
      - name: argocd
        bin: argocd
        brew: argocd
        description: GitOps continuous delivery CLI for Kubernetes
        version_args: ["version", "--client", "--short"]
        completion_zsh: ["argocd", "completion", "zsh"]
        osv: {ecosystem: Go, name: github.com/argoproj/argo-cd/v2}
        github:
          repo: argoproj/argo-cd
          asset: "argocd-{os}-{arch}"
      - name: flux
        bin: flux
        brew: fluxcd/tap/flux
        description: GitOps toolkit CLI (Flux CD)
        completion_zsh: ["flux", "completion", "zsh"]
        github:
          repo: fluxcd/flux2
          asset: "flux_{version}_{os}_{arch}.tar.gz"
      - name: velero
        bin: velero
        brew: velero
        description: Kubernetes backup and restore
        version_args: ["version", "--client-only"]
        completion_zsh: ["velero", "completion", "zsh"]
      - name: kubeseal
        bin: kubeseal
        brew: kubeseal
        description: Encrypt secrets for Sealed Secrets controller
      - name: krew
        bin: kubectl-krew
        brew: krew
        description: Plugin manager for kubectl
      - name: helmfile
        bin: helmfile
        brew: helmfile
        description: Declarative spec for deploying Helm charts
        completion_zsh: ["helmfile", "completion", "zsh"]
      - name: kubeconform
        bin: kubeconform
        brew: kubeconform
        description: Fast Kubernetes manifest validation
      - name: popeye
        bin: popeye
        brew: popeye
        description: Kubernetes cluster sanitizer / linter
      - name: skaffold
        bin: skaffold
        brew: skaffold
        description: Continuous development for Kubernetes apps
        completion_zsh: ["skaffold", "completion", "zsh"]
      - name: k3d
        bin: k3d
        brew: k3d
        description: Run k3s (lightweight Kubernetes) in Docker
        completion_zsh: ["k3d", "completion", "zsh"]

  - name: Infrastructure as Code
    tools:
      - name: terraform
        bin: terraform
        brew: hashicorp/tap/terraform
        description: HashiCorp infrastructure as code
        version_args: ["version"]
        osv: {ecosystem: Go, name: github.com/hashicorp/terraform}
      - name: opentofu
        bin: tofu
        brew: opentofu
        description: Open-source Terraform fork (Linux Foundation)
        version_args: ["version"]
      - name: terragrunt
        bin: terragrunt
        brew: terragrunt
        description: Terraform wrapper for DRY multi-env configs
      - name: tflint
        bin: tflint
        brew: terraform-linters/tap/tflint
        cask: true
        description: Terraform linter
      - name: terraform-docs
        bin: terraform-docs
        brew: terraform-docs
        description: Generate docs from Terraform modules
      - name: infracost
        bin: infracost
        brew: infracost
        description: Cloud cost estimates for Terraform
        completion_zsh: ["infracost", "completion", "--shell", "zsh"]
      - name: packer
        bin: packer
        brew: hashicorp/tap/packer
        description: Machine image builder
        version_args: ["version"]
      - name: ansible
        bin: ansible
        brew: ansible
        description: Agentless configuration management
      - name: pulumi
        bin: pulumi
        brew: pulumi
        description: Infrastructure as code in real languages
        completion_zsh: ["pulumi", "gen-completion", "zsh"]

  - name: Cloud CLIs
    tools:
      - name: aws
        bin: aws
        brew: awscli
        description: Amazon Web Services CLI v2
      - name: eksctl
        bin: eksctl
        brew: eksctl
        description: Create and manage EKS clusters
        version_args: ["version"]
        completion_zsh: ["eksctl", "completion", "zsh"]
      - name: azure
        bin: az
        brew: azure-cli
        description: Microsoft Azure CLI
      - name: gcloud
        bin: gcloud
        brew: gcloud-cli
        cask: true
        description: Google Cloud SDK
      - name: doctl
        bin: doctl
        brew: doctl
        description: DigitalOcean CLI
        completion_zsh: ["doctl", "completion", "zsh"]
      - name: scw
        bin: scw
        brew: scw
        description: Scaleway CLI (French cloud provider)
        completion_zsh: ["scw", "autocomplete", "script", "shell=zsh"]

  - name: Containers
    tools:
      - name: docker
        bin: docker
        brew: docker
        description: Docker CLI (pair with colima as runtime on macOS)
      - name: docker-compose
        bin: docker-compose
        brew: docker-compose
        description: Multi-container applications
      - name: colima
        bin: colima
        brew: colima
        description: Container runtime for macOS (Docker Desktop alternative)
        version_args: ["version"]
      - name: podman
        bin: podman
        brew: podman
        description: Daemonless container engine
        completion_zsh: ["podman", "completion", "zsh"]
      - name: lazydocker
        bin: lazydocker
        brew: lazydocker
        description: Terminal UI for Docker
        github:
          repo: jesseduffield/lazydocker
          asset: "lazydocker_{version}_{os}_{arch}.tar.gz"
          os_map: {darwin: Darwin, linux: Linux}
          arch_map: {amd64: x86_64, arm64: arm64}
      - name: dive
        bin: dive
        brew: dive
        description: Explore and optimize Docker image layers
      - name: skopeo
        bin: skopeo
        brew: skopeo
        description: Inspect and copy container images between registries
      - name: crane
        bin: crane
        brew: crane
        description: Interact with container registries
        version_args: ["version"]
      - name: hadolint
        bin: hadolint
        brew: hadolint
        description: Dockerfile linter

  - name: Git & CI/CD
    tools:
      - name: gh
        bin: gh
        brew: gh
        description: GitHub CLI
        completion_zsh: ["gh", "completion", "-s", "zsh"]
        osv: {ecosystem: Go, name: github.com/cli/cli/v2}
      - name: glab
        bin: glab
        brew: glab
        description: GitLab CLI
        completion_zsh: ["glab", "completion", "-s", "zsh"]
      - name: act
        bin: act
        brew: act
        description: Run GitHub Actions locally
      - name: pre-commit
        bin: pre-commit
        brew: pre-commit
        description: Git hooks framework
      - name: lazygit
        bin: lazygit
        brew: lazygit
        description: Terminal UI for git
        github:
          repo: jesseduffield/lazygit
          asset: "lazygit_{version}_{os}_{arch}.tar.gz"
          arch_map: {amd64: x86_64, arm64: arm64}

  - name: Observability & Monitoring
    tools:
      - name: k6
        bin: k6
        brew: k6
        description: Modern load testing (Grafana k6)
        version_args: ["version"]
        completion_zsh: ["k6", "completion", "zsh"]
      - name: vegeta
        bin: vegeta
        brew: vegeta
        description: HTTP load testing and attack tool
        version_args: ["-version"]
      - name: btop
        bin: btop
        brew: btop
        description: Resource monitor (CPU, memory, network, processes)
      - name: ctop
        bin: ctop
        brew: ctop
        description: top-like metrics for containers
        version_args: ["-v"]

  - name: Logs
    tools:
      - name: lnav
        bin: lnav
        brew: lnav
        description: Log file navigator with SQL queries
        version_args: ["-V"]
      - name: goaccess
        bin: goaccess
        brew: goaccess
        description: Real-time web log analyzer

  - name: Networking & HTTP
    tools:
      - name: httpie
        bin: http
        brew: httpie
        description: Human-friendly HTTP client
      - name: curlie
        bin: curlie
        brew: curlie
        description: curl with the ease of httpie
      - name: grpcurl
        bin: grpcurl
        brew: grpcurl
        description: curl for gRPC services
        version_args: ["-version"]
      - name: websocat
        bin: websocat
        brew: websocat
        description: WebSocket client and swiss-army knife
      - name: doggo
        bin: doggo
        brew: doggo
        description: Modern DNS client
      - name: mtr
        bin: mtr
        brew: mtr
        description: traceroute + ping network diagnostics
      - name: nmap
        bin: nmap
        brew: nmap
        description: Network discovery and port scanning

  - name: Databases
    tools:
      - name: pgcli
        bin: pgcli
        brew: pgcli
        description: PostgreSQL client with autocompletion
      - name: mycli
        bin: mycli
        brew: mycli
        description: MySQL/MariaDB client with autocompletion
      - name: usql
        bin: usql
        brew: xo/xo/usql
        description: Universal SQL client (one CLI, every database)

  - name: Security & Compliance
    tools:
      - name: trivy
        bin: trivy
        brew: trivy
        description: Vulnerability scanner for containers and IaC
        completion_zsh: ["trivy", "completion", "zsh"]
        osv: {ecosystem: Go, name: github.com/aquasecurity/trivy}
      - name: grype
        bin: grype
        brew: grype
        description: Vulnerability scanner for images and filesystems
        version_args: ["version"]
        completion_zsh: ["grype", "completion", "zsh"]
        github:
          repo: anchore/grype
          asset: "grype_{version}_{os}_{arch}.tar.gz"
      - name: syft
        bin: syft
        brew: syft
        description: SBOM generator for containers and code
        version_args: ["version"]
        completion_zsh: ["syft", "completion", "zsh"]
        github:
          repo: anchore/syft
          asset: "syft_{version}_{os}_{arch}.tar.gz"
      - name: gitleaks
        bin: gitleaks
        brew: gitleaks
        description: Detect secrets committed in git repos
        version_args: ["version"]
        completion_zsh: ["gitleaks", "completion", "zsh"]
        github:
          repo: gitleaks/gitleaks
          asset: "gitleaks_{version}_{os}_{arch}.tar.gz"
          arch_map: {amd64: x64, arm64: arm64}
      - name: cosign
        bin: cosign
        brew: cosign
        description: Sign and verify container images
        version_args: ["version"]
        completion_zsh: ["cosign", "completion", "zsh"]
        github:
          repo: sigstore/cosign
          asset: "cosign-{os}-{arch}"
      - name: oras
        bin: oras
        brew: oras
        description: Manage OCI artifacts in registries
        completion_zsh: ["oras", "completion", "zsh"]
      - name: kubent
        bin: kubent
        brew: kubent
        description: Detect deprecated Kubernetes APIs (kube-no-trouble)

  - name: Secrets & Identity
    tools:
      - name: sops
        bin: sops
        brew: sops
        description: Encrypted secrets in git (age/KMS/PGP)
      - name: age
        bin: age
        brew: age
        description: Simple, modern file encryption
      - name: vault
        bin: vault
        brew: hashicorp/tap/vault
        description: HashiCorp secrets management
        version_args: ["version"]
      - name: 1password-cli
        bin: op
        brew: 1password-cli
        cask: true
        description: 1Password command-line tool
      - name: bitwarden-cli
        bin: bw
        brew: bitwarden-cli
        description: Bitwarden password manager CLI
      - name: infisical
        bin: infisical
        brew: infisical
        description: Open-source secrets management platform CLI
      - name: doppler
        bin: doppler
        brew: doppler
        description: SecretOps platform CLI
        completion_zsh: ["doppler", "completion", "zsh"]
      - name: teller
        bin: teller
        brew: teller
        description: Secrets manager for developers (multi-backend)
      - name: step
        bin: step
        brew: step
        description: Zero-trust certificate and PKI toolkit (smallstep)
        completion_zsh: ["step", "completion", "zsh"]
      - name: cfssl
        bin: cfssl
        brew: cfssl
        description: CloudFlare's PKI/TLS toolkit
      - name: gopass
        bin: gopass
        brew: gopass
        description: Team password manager on top of git + GPG
      - name: mkcert
        bin: mkcert
        brew: mkcert
        description: Locally-trusted development certificates

  - name: Serverless & PaaS
    tools:
      - name: vercel
        bin: vercel
        brew: vercel-cli
        description: Deploy frontends and serverless functions (Vercel)
      - name: netlify
        bin: netlify
        brew: netlify-cli
        description: Deploy and manage sites on Netlify
      - name: flyctl
        bin: flyctl
        brew: flyctl
        description: Deploy apps close to users on Fly.io
        completion_zsh: ["flyctl", "completion", "zsh"]
      - name: railway
        bin: railway
        brew: railway
        description: Deploy apps and databases on Railway
        completion_zsh: ["railway", "completion", "zsh"]
      - name: serverless
        bin: serverless
        brew: serverless
        description: Serverless Framework CLI (AWS Lambda et al.)

  - name: Utilities
    tools:
      - name: jq
        bin: jq
        brew: jq
        description: JSON processor
      - name: yq
        bin: yq
        brew: yq
        description: YAML/XML/TOML processor
        completion_zsh: ["yq", "shell-completion", "zsh"]
      - name: fzf
        bin: fzf
        brew: fzf
        description: Fuzzy finder for the command line
      - name: ripgrep
        bin: rg
        brew: ripgrep
        description: Blazing fast recursive grep
      - name: bat
        bin: bat
        brew: bat
        description: cat with syntax highlighting
      - name: fd
        bin: fd
        brew: fd
        description: Fast and friendly alternative to find
      - name: tldr
        bin: tldr
        brew: tldr
        description: Community-driven simplified man pages
      - name: direnv
        bin: direnv
        brew: direnv
        description: Per-directory environment variables
      - name: zoxide
        bin: zoxide
        brew: zoxide
        description: Smarter cd that learns your habits
        github:
          repo: ajeetdsouza/zoxide
          asset: "zoxide-{version}-{arch}-{os}.tar.gz"
          os_map: {darwin: apple-darwin, linux: unknown-linux-musl}
          arch_map: {amd64: x86_64, arm64: aarch64}
      - name: atuin
        bin: atuin
        brew: atuin
        description: Full-text shell history with sync
        # No github: block — atuin ships no macOS-amd64 release binary,
        # so brew (which builds it) is the only backend that covers every
        # platform. Adding a partial github block would fail on Intel Macs.
      - name: eza
        bin: eza
        brew: eza
        description: Modern replacement for ls
      - name: just
        bin: just
        brew: just
        description: Command runner (a modern make for tasks)
        completion_zsh: ["just", "--completions", "zsh"]
      - name: task
        bin: task
        brew: task
        description: Task runner / build tool (Taskfile.yml)
        completion_zsh: ["task", "--completion", "zsh"]
      - name: gron
        bin: gron
        brew: gron
        description: Make JSON greppable
      - name: jless
        bin: jless
        brew: jless
        description: Terminal JSON/YAML viewer and pager
      - name: hurl
        bin: hurl
        brew: hurl
        description: Run and test HTTP requests in plain text
      - name: duckdb
        bin: duckdb
        brew: duckdb
        description: In-process analytical SQL database
